<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>트립N빵 (TripNBang)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --danger: #fb7185;
            --success: #34d399;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Mesh Gradient Background */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #0f172a;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: move 20s infinite alternate linear;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: #db2777;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #0284c7;
            top: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 100px) scale(1.1); }
            100% { transform: translate(-50px, 50px) scale(0.9); }
        }

        /* Mobile Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Header */
        .header {
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0));
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a5b4fc, #fbcfe8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 0 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Elements */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .input-row {
            display: flex;
            gap: 0.75rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], input[type="date"], select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }

        /* Buttons */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        button:active {
            transform: scale(0.97);
        }
        
        button:disabled {
            background: rgba(255,255,255,0.1) !important;
            color: rgba(255,255,255,0.3) !important;
            border-color: transparent !important;
            cursor: not-allowed;
        }

        button.small {
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            border-radius: 8px;
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        button.danger {
            background: rgba(251, 113, 133, 0.2);
            color: var(--danger);
            border: 1px solid rgba(251, 113, 133, 0.3);
        }

        button.success {
            background: var(--success);
            color: #064e3b;
        }

        /* Member Tags */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: zoomIn 0.2s ease-out;
        }

        .tag-remove {
            background: transparent;
            color: var(--text-muted);
            width: 16px;
            height: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Participants Checkboxes */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
        }

        .checkbox-item {
            position: relative;
            cursor: pointer;
        }

        .checkbox-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .checkbox-btn {
            display: block;
            text-align: center;
            padding: 0.6rem 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s;
            user-select: none;
        }

        .checkbox-item input:checked ~ .checkbox-btn {
            background: var(--primary);
            border-color: var(--primary-hover);
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.4);
            transform: translateY(-2px);
        }

        /* Expense List */
        .expense-item {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.3s ease-out;
        }
        .expense-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.25rem;
        }

        .exp-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .exp-amount {
            font-weight: 700;
            color: var(--success);
            font-size: 1.1rem;
        }

        .exp-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .exp-details {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 8px;
            color: #cbd5e1;
        }

        /* Settlement Results */
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .result-names {
            font-weight: 600;
        }

        .result-amount {
            color: var(--success);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .empty-text {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            padding: 1rem 0;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .warning-text {
            background: rgba(251, 113, 133, 0.1);
            color: #fda4af;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            line-height: 1.4;
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        /* Toss Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .toss-btn {
            background: #0050FF;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            border: none;
            margin-left: auto;
            width: auto;
            font-weight: 700;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="app-container">
    <div class="header">
        <h1>트립N빵</h1>
        <p style="font-size: 0.875rem; color: var(--text-muted);">Smart Travel Expense Splitter</p>
    </div>

    <div class="content">
        <!-- 1. Event Info -->
        <div class="glass-card">
            <div class="card-title">🏕️ 일정 정보</div>
            <div class="input-group">
                <input type="text" id="event-title" placeholder="모임/여행 이름 (예: 여름 제주도 여행)" onchange="saveData()">
            </div>
            <div class="input-row">
                <div class="input-group" style="flex:1;">
                    <label>시작일</label>
                    <input type="date" id="event-start" onchange="saveData()">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>종료일</label>
                    <input type="date" id="event-end" onchange="saveData()">
                </div>
            </div>
        </div>

        <!-- 2. Members -->
        <div class="glass-card">
            <div class="card-title">👥 참석 멤버</div>
            
            <div id="member-setup-step1">
                <div class="input-row">
                    <input type="number" id="member-count" placeholder="참석 인원수 (예: 4)" min="1" style="flex:1;">
                    <button class="small" onclick="generateMemberInputs()">인원 설정</button>
                </div>
            </div>

            <div id="member-setup-step2" style="display: none; margin-top: 1rem;">
                <div id="dynamic-member-inputs" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                    <!-- Inputs injected here -->
                </div>
                <div class="input-row">
                    <button class="small outline" style="flex:1;" onclick="resetMemberSetup()">다시 입력</button>
                    <button class="small" style="flex:2;" onclick="saveMembers()">멤버 확정하기</button>
                </div>
            </div>

            <div class="tags-container" id="members-list" style="margin-top: 1rem; display: none;">
                <!-- Members will appear here -->
            </div>
            <div id="member-add-more" style="display: none; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <div class="input-row">
                    <input type="text" id="new-member-name" placeholder="추가할 이름 입력" onkeypress="handleMemberKey(event)" style="flex:1; padding: 0.5rem; font-size: 0.875rem;">
                    <button class="small outline" onclick="addSingleMember()">개별 추가</button>
                </div>
            </div>
        </div>

        <!-- 3. Expenses -->
        <div class="glass-card" id="expense-section" style="display: none;">
            <div class="card-title">💳 비용 등록</div>
            
            <!-- OCR Button -->
            <input type="file" id="ocr-upload" accept="image/*" capture="environment" style="display:none;" onchange="processOCR(event)">
            <button class="outline" id="ocr-btn" style="margin-bottom: 1rem; border-color: #a855f7; color: #e9d5ff;" onclick="document.getElementById('ocr-upload').click()">
                📸 영수증 스캔 (스마트 자동입력)
            </button>
            <div id="ocr-status" style="display: none; text-align: center; font-size: 0.8rem; color: #d8b4fe; margin-bottom: 1rem; animation: pulse 1.5s infinite;">
                영수증의 글자를 분석하고 있습니다... 잠시만 기다려주세요 ⏳
            </div>

            <div class="input-row">
                <div class="input-group" style="flex: 1.5;">
                    <label>날짜</label>
                    <input type="date" id="expense-date">
                </div>
                <div class="input-group" style="flex: 2;">
                    <label>금액 (원)</label>
                    <input type="number" id="expense-amount" placeholder="0">
                </div>
            </div>

            <div class="input-group">
                <label>결제 내역 (어디서?)</label>
                <input type="text" id="expense-desc" placeholder="예: 흑돼지 고기집">
            </div>

            <div class="input-group">
                <label>결제한 사람</label>
                <select id="expense-payer"></select>
            </div>

            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label style="margin:0;">N빵할 대상자</label>
                    <button class="small outline" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; border-width: 1px;" onclick="selectAllParticipants()">전체선택/해제</button>
                </div>
                <div class="checkbox-grid" id="expense-participants">
                    <!-- Checkboxes -->
                </div>
            </div>

            <button onclick="addExpense()" style="margin-top: 1rem;">비용 추가하기</button>

            <!-- Expense List -->
            <div id="expenses-list" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <!-- Items -->
            </div>
        </div>

        <!-- 4. Settlement -->
        <div class="glass-card" id="settlement-section" style="display: none;">
            <div class="card-title">🧾 최종 정산</div>
            <button class="success" onclick="calculateSettlement()">정산 결과 계산하기</button>
            
            <div id="settlement-result" style="display: none; margin-top: 1.5rem;">
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div style="font-size: 0.875rem; color: var(--text-muted);">총 사용 금액</div>
                    <div id="total-amount-display" style="font-size: 1.75rem; font-weight: 800; color: white;">0원</div>
                </div>

                <div id="settlement-list">
                    <!-- Results -->
                </div>

                <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                    <button onclick="exportToCSV()" style="flex:1; background: #10b981; font-size: 0.875rem;">
                        📊 엑셀 다운
                    </button>
                    <button onclick="exportToEmail()" style="flex:1; background: #4f46e5; font-size: 0.875rem;">
                        📧 이메일 공유
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Toss Settings Modal -->
        <div id="toss-modal" class="modal-overlay">
            <div class="glass-card" style="width: 90%; max-width: 400px; padding: 1.5rem;">
                <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem; color: #fff;">💙 토스 송금 설정</h3>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem;">
                    송금받을 <strong style="color:var(--primary);" id="toss-receiver-name"></strong>님의 계좌를 한 번만 입력해두면 원클릭 송금이 가능해집니다.
                </p>
                <div class="input-group">
                    <label>은행명 (예: 국민, 신한, 카카오뱅크)</label>
                    <input type="text" id="toss-bank-input" placeholder="예: 국민">
                </div>
                <div class="input-group">
                    <label>계좌번호 (숫자만)</label>
                    <input type="number" id="toss-account-input" placeholder="1234567890">
                </div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                    <button class="outline" style="flex:1;" onclick="closeTossModal()">취소</button>
                    <button style="flex:2; background: #0050FF; font-size: 0.9rem;" onclick="saveTossInfoAndSend()">저장 후 토스 열기</button>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="warning-text">
                ⚠️ <strong>데이터 저장 안내</strong><br>입력된 데이터는 현재 기기(브라우저)에만 임시 저장됩니다. 브라우저 캐시 및 쿠키를 삭제하면 데이터가 초기화될 수 있습니다.
            </div>
            <div>Developed by Park, YeonJae</div>
        </div>
    </div>
</div>

<style>
    @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
    }
</style>

<script>
    let members = [];
    let expenses = [];
    let settlementTransactions = [];
    let bankInfo = {};
    let currentTossTarget = { name: '', amount: 0 };

    // Helper: format currency
    function formatMoney(amount) {
        return Math.round(amount).toLocaleString('ko-KR') + '원';
    }

    // Default dates
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('event-start').value = today;
    document.getElementById('event-end').value = today;
    document.getElementById('expense-date').value = today;

    // --- Local Storage Data Management ---
    function saveData() {
        const data = {
            title: document.getElementById('event-title').value,
            start: document.getElementById('event-start').value,
            end: document.getElementById('event-end').value,
            members: members,
            expenses: expenses,
            bankInfo: bankInfo
        };
        localStorage.setItem('tripSplitData', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('tripSplitData');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.title) document.getElementById('event-title').value = data.title;
                if (data.start) document.getElementById('event-start').value = data.start;
                if (data.end) document.getElementById('event-end').value = data.end;
                
                members = data.members || [];
                expenses = data.expenses || [];
                bankInfo = data.bankInfo || {};
                
                if (members.length > 0) {
                    renderMembers();
                    updateVisibility();
                }
                if (expenses.length > 0) {
                    renderExpensesList();
                }
            } catch(e) {
                console.error('데이터 로드 실패', e);
            }
        }
    }

    // Run on init
    document.addEventListener('DOMContentLoaded', loadData);


    // --- Members Management ---
    function handleMemberKey(e) {
        if (e.key === 'Enter') addSingleMember();
    }

    function generateMemberInputs() {
        const count = parseInt(document.getElementById('member-count').value);
        if (isNaN(count) || count <= 0) {
            alert('올바른 인원수를 입력해주세요.');
            return;
        }

        const container = document.getElementById('dynamic-member-inputs');
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
            container.innerHTML += `
                <input type="text" class="member-name-input" placeholder="멤버 ${i+1} 이름">
            `;
        }
        
        document.getElementById('member-setup-step1').style.display = 'none';
        document.getElementById('member-setup-step2').style.display = 'block';
    }

    function resetMemberSetup() {
        document.getElementById('member-setup-step1').style.display = 'block';
        document.getElementById('member-setup-step2').style.display = 'none';
        document.getElementById('member-count').value = '';
    }

    function saveMembers() {
        const inputs = document.querySelectorAll('.member-name-input');
        let newMembers = [];
        let hasEmpty = false;
        
        inputs.forEach(input => {
            const val = input.value.trim();
            if(!val) hasEmpty = true;
            else if(!newMembers.includes(val) && !members.includes(val)) {
                newMembers.push(val);
            }
        });

        if(hasEmpty) {
            alert('모든 멤버의 이름을 입력해주세요.');
            return;
        }

        members = [...members, ...newMembers];
        
        renderMembers();
        updateVisibility();
        saveData();
    }

    function addSingleMember() {
        const input = document.getElementById('new-member-name');
        const name = input.value.trim();
        
        if (name && !members.includes(name)) {
            members.push(name);
            input.value = '';
            renderMembers();
            updateVisibility();
            saveData();
        } else if (members.includes(name)) {
            alert('이미 존재하는 이름입니다.');
        }
    }

    function removeMember(name) {
        const isInvolved = expenses.some(exp => exp.payer === name || exp.participants.includes(name));
        if (isInvolved) {
            alert('비용 내역에 포함된 멤버는 삭제할 수 없습니다.');
            return;
        }

        members = members.filter(m => m !== name);
        renderMembers();
        updateVisibility();
        saveData();
    }

    function renderMembers() {
        const list = document.getElementById('members-list');
        list.innerHTML = '';

        if (members.length > 0) {
            document.getElementById('members-list').style.display = 'flex';
            document.getElementById('member-add-more').style.display = 'block';
            document.getElementById('member-setup-step1').style.display = 'none';
            document.getElementById('member-setup-step2').style.display = 'none';
            
            members.forEach(name => {
                const el = document.createElement('div');
                el.className = 'tag';
                el.innerHTML = `
                    ${name}
                    <button class="tag-remove" onclick="removeMember('${name}')">&times;</button>
                `;
                list.appendChild(el);
            });
        } else {
            document.getElementById('members-list').style.display = 'none';
            document.getElementById('member-add-more').style.display = 'none';
            document.getElementById('member-setup-step1').style.display = 'block';
            document.getElementById('member-setup-step2').style.display = 'none';
        }

        renderPayerSelect();
        renderParticipantsCheckboxes();
    }

    function updateVisibility() {
        const expSec = document.getElementById('expense-section');
        const setSec = document.getElementById('settlement-section');
        if (members.length > 0) {
            expSec.style.display = 'block';
            setSec.style.display = 'block';
        } else {
            expSec.style.display = 'none';
            setSec.style.display = 'none';
        }
    }

    // --- Expense Management ---
    function renderPayerSelect() {
        const select = document.getElementById('expense-payer');
        const currentVal = select.value;
        select.innerHTML = '';
        members.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            select.appendChild(opt);
        });
        if (members.includes(currentVal)) {
            select.value = currentVal;
        }
    }

    function renderParticipantsCheckboxes() {
        const container = document.getElementById('expense-participants');
        container.innerHTML = '';
        members.forEach(name => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            label.innerHTML = `
                <input type="checkbox" value="${name}" checked />
                <span class="checkbox-btn">${name}</span>
            `;
            container.appendChild(label);
        });
    }

    function selectAllParticipants() {
        const checkboxes = document.querySelectorAll('#expense-participants input[type="checkbox"]');
        let allChecked = Array.from(checkboxes).every(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !allChecked); // Toggle
    }

    function addExpense() {
        const date = document.getElementById('expense-date').value;
        const desc = document.getElementById('expense-desc').value.trim();
        const amount = parseFloat(document.getElementById('expense-amount').value);
        const payer = document.getElementById('expense-payer').value;
        
        const checkboxes = document.querySelectorAll('#expense-participants input[type="checkbox"]:checked');
        const participants = Array.from(checkboxes).map(cb => cb.value);

        if (!desc) { alert('결제 내역을 입력해주세요.'); return; }
        if (isNaN(amount) || amount <= 0) { alert('올바른 금액을 입력해주세요.'); return; }
        if (participants.length === 0) { alert('비용 대상자를 1명 이상 선택해주세요.'); return; }

        expenses.push({
            id: Date.now(),
            date,
            desc,
            amount,
            payer,
            participants
        });

        // Reset form specific fields
        document.getElementById('expense-desc').value = '';
        document.getElementById('expense-amount').value = '';
        
        renderExpensesList();
        document.getElementById('settlement-result').style.display = 'none';
        saveData();
    }

    function removeExpense(id) {
        expenses = expenses.filter(e => e.id !== id);
        renderExpensesList();
        document.getElementById('settlement-result').style.display = 'none';
        saveData();
    }

    function renderExpensesList() {
        const container = document.getElementById('expenses-list');
        container.innerHTML = '';

        if (expenses.length === 0) {
            container.innerHTML = '<div class="empty-text">등록된 비용이 없습니다.</div>';
            return;
        }

        // Sort by date ascending
        expenses.sort((a, b) => new Date(a.date) - new Date(b.date));

        expenses.forEach(exp => {
            const splitAmount = exp.amount / exp.participants.length;
            const el = document.createElement('div');
            el.className = 'expense-item';
            el.innerHTML = `
                <div class="exp-header">
                    <div>
                        <div class="exp-meta">📅 ${exp.date}</div>
                        <div class="exp-title">${exp.desc}</div>
                    </div>
                    <div class="exp-amount">${formatMoney(exp.amount)}</div>
                </div>
                <div class="exp-details">
                    <span style="color: var(--primary);">결제:</span> ${exp.payer}<br>
                    <span style="color: #94a3b8;">대상:</span> ${exp.participants.join(', ')} (1인 ${formatMoney(splitAmount)})
                </div>
                <button class="small danger" style="margin-top: 0.5rem; width: 100%;" onclick="removeExpense(${exp.id})">삭제</button>
            `;
            container.appendChild(el);
        });
    }

    // --- Smart OCR (Tesseract.js) ---
    async function processOCR(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusEl = document.getElementById('ocr-status');
        const btn = document.getElementById('ocr-btn');
        
        statusEl.style.display = 'block';
        btn.disabled = true;
        
        try {
            // Load Tesseract
            const worker = await Tesseract.createWorker('kor+eng');
            const ret = await worker.recognize(file);
            const text = ret.data.text;
            
            await worker.terminate();
            
            // Parsing Logic
            let foundDate = '';
            let foundAmount = 0;
            let foundDesc = '';

            // 1. Date extraction: looks for YYYY-MM-DD or similar formats
            const dateMatch = text.match(/20\d{2}[-./\s년]+[01]?\d[-./\s월]+[0-3]?\d/);
            if (dateMatch) {
                const dStr = dateMatch[0].replace(/[^0-9]/g, '');
                if(dStr.length === 8) {
                    foundDate = `${dStr.substring(0,4)}-${dStr.substring(4,6)}-${dStr.substring(6,8)}`;
                }
            }

            // 2. Amount extraction: looks for numbers with commas, take the largest
            const numbers = text.match(/\d{1,3}(,\d{3})+|\d{4,}/g);
            if (numbers) {
                const parsedNumbers = numbers.map(n => parseInt(n.replace(/,/g, '')));
                // Usually the largest number on a receipt is the total amount
                foundAmount = Math.max(...parsedNumbers);
            }

            // 3. Store Name extraction: Topmost non-empty line
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
            if (lines.length > 0) {
                // Take the first line, clean up weird characters
                foundDesc = lines[0].replace(/[^가-힣a-zA-Z0-9\s]/g, '').trim();
            }

            // Populate DOM
            if(foundDate) document.getElementById('expense-date').value = foundDate;
            if(foundAmount > 0) document.getElementById('expense-amount').value = foundAmount;
            if(foundDesc) document.getElementById('expense-desc').value = foundDesc;
            
            alert(`✅ 영수증 분석 완료!\n추출된 내용을 확인하고 필요시 수정해주세요.\n\n날짜: ${foundDate || '못찾음'}\n금액: ${foundAmount ? formatMoney(foundAmount) : '못찾음'}\n상호: ${foundDesc || '못찾음'}`);
            
        } catch(err) {
            alert('영수증 분석 중 오류가 발생했습니다.');
            console.error(err);
        } finally {
            statusEl.style.display = 'none';
            btn.disabled = false;
            e.target.value = ''; // Reset input
        }
    }


    // --- Settlement Logic ---
    function calculateSettlement() {
        if (expenses.length === 0) {
            alert('등록된 비용이 없습니다.');
            return;
        }

        let balances = {};
        members.forEach(m => balances[m] = 0);

        expenses.forEach(exp => {
            balances[exp.payer] += exp.amount;
            
            const splitAmount = exp.amount / exp.participants.length;
            exp.participants.forEach(p => {
                balances[p] -= splitAmount;
            });
        });

        let debtors = [];
        let creditors = [];

        Object.keys(balances).forEach(m => {
            if (balances[m] > 0.01) creditors.push({ name: m, amount: balances[m] });
            else if (balances[m] < -0.01) debtors.push({ name: m, amount: -balances[m] });
        });

        debtors.sort((a, b) => b.amount - a.amount);
        creditors.sort((a, b) => b.amount - a.amount);

        settlementTransactions = [];
        let d = 0;
        let c = 0;

        while (d < debtors.length && c < creditors.length) {
            let debtor = debtors[d];
            let creditor = creditors[c];
            
            let amount = Math.min(debtor.amount, creditor.amount);
            
            settlementTransactions.push({
                from: debtor.name,
                to: creditor.name,
                amount: amount
            });

            debtor.amount -= amount;
            creditor.amount -= amount;

            if (debtor.amount < 0.01) d++;
            if (creditor.amount < 0.01) c++;
        }

        renderSettlement();
    }

    function renderSettlement() {
        const container = document.getElementById('settlement-list');
        const wrapper = document.getElementById('settlement-result');
        const totalDisplay = document.getElementById('total-amount-display');
        
        container.innerHTML = '';

        let totalExpense = expenses.reduce((sum, exp) => sum + exp.amount, 0);
        totalDisplay.textContent = formatMoney(totalExpense);

        if (settlementTransactions.length === 0) {
            container.innerHTML = `<div class="empty-text">정산할 금액이 없습니다. (완벽하게 나누어짐!)</div>`;
        } else {
            settlementTransactions.forEach(tx => {
                const el = document.createElement('div');
                el.className = 'result-item';
                el.style.display = 'flex';
                el.style.alignItems = 'center';
                el.innerHTML = `
                    <div style="flex:1;">
                        <div class="result-names">
                            <span>${tx.from}</span>
                            <span style="color: var(--text-muted); margin: 0 0.5rem;">➔</span>
                            <span>${tx.to}</span>
                        </div>
                        <div class="result-amount" style="font-size: 1rem;">${formatMoney(tx.amount)}</div>
                    </div>
                    <button class="toss-btn" onclick="openTossModal('${tx.to}', ${tx.amount})">Toss 송금</button>
                `;
                container.appendChild(el);
            });
        }

        wrapper.style.display = 'block';
        
        setTimeout(() => {
            document.querySelector('.content').scrollTo({
                top: document.querySelector('.content').scrollHeight,
                behavior: 'smooth'
            });
        }, 100);
    }

    // --- Export Logic ---
    function exportToEmail() {
        const eventTitle = document.getElementById('event-title').value || '트립N빵';
        const startDate = document.getElementById('event-start').value;
        const endDate = document.getElementById('event-end').value;
        let dateString = startDate === endDate ? startDate : `${startDate} ~ ${endDate}`;
        
        let totalExpense = expenses.reduce((sum, exp) => sum + exp.amount, 0);

        let body = `[${eventTitle}] 정산 내역입니다.\n`;
        body += `일정: ${dateString}\n`;
        body += `총 사용 금액: ${formatMoney(totalExpense)}\n\n`;
        
        body += `--- 💳 결제 내역 ---\n`;
        let sortedExpenses = [...expenses].sort((a, b) => new Date(a.date) - new Date(b.date));
        sortedExpenses.forEach(exp => {
            body += `[${exp.date}] ${exp.desc}: ${formatMoney(exp.amount)}\n`;
            body += `  - 결제: ${exp.payer}\n`;
            body += `  - 대상: ${exp.participants.join(', ')}\n`;
        });
        
        body += `\n--- 🧾 정산 결과 (보낼 돈) ---\n`;
        if (settlementTransactions.length === 0) {
            body += `정산할 금액이 없습니다.\n`;
        } else {
            settlementTransactions.forEach(tx => {
                body += `${tx.from} 님이 ${tx.to} 님에게 ${formatMoney(tx.amount)} 송금\n`;
            });
        }

        body += `\n감사합니다.`;

        const formattedBody = body.replace(/\n/g, '\r\n');
        const subject = encodeURIComponent(`[트립N빵] ${eventTitle} 정산 내역`);
        const bodyEncoded = encodeURIComponent(formattedBody);
        const mailtoLink = `mailto:?subject=${subject}&body=${bodyEncoded}`;

        window.location.href = mailtoLink;
    }

    function exportToCSV() {
        const eventTitle = document.getElementById('event-title').value || '트립N빵';
        // Add UTF-8 BOM for Excel compatibility with Korean
        let csvContent = '\uFEFF';
        
        csvContent += `일정,${eventTitle}\n`;
        csvContent += `시작일,${document.getElementById('event-start').value}\n`;
        csvContent += `종료일,${document.getElementById('event-end').value}\n\n`;
        
        csvContent += `[비용 상세 내역]\n`;
        csvContent += `날짜,결제내역,금액,결제자,N빵 대상자\n`;
        let sortedExpenses = [...expenses].sort((a, b) => new Date(a.date) - new Date(b.date));
        sortedExpenses.forEach(exp => {
            const safeDesc = exp.desc.replace(/"/g, '""');
            const safeParts = exp.participants.join(', ').replace(/"/g, '""');
            csvContent += `${exp.date},"${safeDesc}",${exp.amount},${exp.payer},"${safeParts}"\n`;
        });
        
        csvContent += `\n[최종 정산 내역 (보낼 돈)]\n`;
        csvContent += `보내는 사람,받는 사람,금액\n`;
        if (settlementTransactions.length === 0) {
            csvContent += `정산할 내역이 없습니다.\n`;
        } else {
            settlementTransactions.forEach(tx => {
                csvContent += `${tx.from},${tx.to},${tx.amount}\n`;
            });
        }

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `${eventTitle}_정산내역.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // --- Toss Integration ---
    function openTossModal(name, amount) {
        if (bankInfo[name] && bankInfo[name].bank && bankInfo[name].account) {
            executeTossDeepLink(name, amount);
        } else {
            currentTossTarget = { name, amount };
            document.getElementById('toss-receiver-name').textContent = name;
            document.getElementById('toss-bank-input').value = '';
            document.getElementById('toss-account-input').value = '';
            document.getElementById('toss-modal').classList.add('active');
        }
    }

    function closeTossModal() {
        document.getElementById('toss-modal').classList.remove('active');
    }

    function saveTossInfoAndSend() {
        const bank = document.getElementById('toss-bank-input').value.trim();
        const account = document.getElementById('toss-account-input').value.trim();

        if (!bank || !account) {
            alert('은행명과 계좌번호를 모두 입력해주세요.');
            return;
        }

        bankInfo[currentTossTarget.name] = { bank, account };
        saveData(); // Save to localStorage
        closeTossModal();
        executeTossDeepLink(currentTossTarget.name, currentTossTarget.amount);
    }

    function executeTossDeepLink(name, amount) {
        const info = bankInfo[name];
        if (!info) return;
        const schemeUrl = `supertoss://send?bank=${encodeURIComponent(info.bank)}&accountNo=${info.account}&amount=${Math.round(amount)}`;
        window.location.href = schemeUrl;
    }
